<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CLUSTER</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;min-height:100vh;background:#0e0e0e;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
  #top-bar{width:100%;max-width:540px;padding:24px 20px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;}
  #top-bar h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#f0ede6;letter-spacing:5px;text-transform:uppercase;}
  #top-bar p{font-family:'DM Mono',monospace;font-size:10px;color:#444;letter-spacing:3px;text-transform:uppercase;}
  #puzzle-meta{font-family:'DM Mono',monospace;font-size:9px;color:#2e2e2e;letter-spacing:2px;margin-top:2px;}
  #divider{width:100%;max-width:540px;height:1px;background:linear-gradient(to right,transparent,#2a2a2a,transparent);margin-bottom:12px;}
  #loading{display:none;font-family:'DM Mono',monospace;font-size:11px;color:#333;letter-spacing:3px;text-transform:uppercase;margin-top:60px;text-align:center;line-height:2.4;}
  .dot{display:inline-block;animation:blink 1.2s infinite;}
  .dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
  #err{display:none;font-family:'DM Mono',monospace;font-size:10px;color:#8b3a3a;letter-spacing:1px;margin-top:40px;text-align:center;line-height:2;}
  #game-wrapper{width:100%;max-width:540px;display:flex;justify-content:center;}
  #game-wrapper canvas{width:100%!important;height:auto!important;}
</style>
</head>
<body>
<div id="top-bar">
  <h1>Cluster</h1>
  <p>Group four words that belong together</p>
  <div id="puzzle-meta"></div>
</div>
<div id="divider"></div>
<div id="loading">Fetching puzzle<br><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
<div id="err"></div>
<div id="game-wrapper"></div>

<script>
// ── Colour map: category string → accent ─────────────────────────────────────
const LEVEL_MAP = {
  yellow: { level:0, accent:0xe8c547, hex:'#e8c547' },
  green:  { level:1, accent:0x6dbf8a, hex:'#6dbf8a' },
  blue:   { level:2, accent:0x6aaed6, hex:'#6aaed6' },
  purple: { level:3, accent:0xb07fd4, hex:'#b07fd4' }
};

// Raw GitHub JSON via free CORS proxy (no key, no account)
const RAW_URL = 'https://raw.githubusercontent.com/Eyefyre/NYT-Connections-Answers/main/connections.json';
const PROXY   = 'https://corsproxy.io/?' + encodeURIComponent(RAW_URL);

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── Parse one raw puzzle entry into our internal format ───────────────────────
// Shape: { date, startingGroups:[{level,members,groupName}] }
//     OR { date, answers:[{category,connection,items}] }
function parsePuzzle(raw) {
  let cats;

  if (raw.answers) {
    // v1 format
    cats = raw.answers.map(a => {
      const info = LEVEL_MAP[a.category] || LEVEL_MAP.yellow;
      return { ...info, label: a.connection.toUpperCase(), words: a.items.map(w=>w.toUpperCase()) };
    });
  } else if (raw.startingGroups) {
    // v2 format
    cats = raw.startingGroups.map(g => {
      const key = ['yellow','green','blue','purple'][g.level] || 'yellow';
      const info = LEVEL_MAP[key];
      return { ...info, label: g.groupName.toUpperCase(), words: g.members.map(w=>w.toUpperCase()) };
    });
  } else {
    return null;
  }

  // sort yellow→purple
  cats.sort((a,b)=>a.level-b.level);
  return { date: raw.date || '?', id: raw.id || '?', categories: cats };
}

async function fetchRandomPuzzle() {
  const res  = await fetch(PROXY, { cache: 'force-cache' });
  if (!res.ok) throw new Error(`Proxy returned ${res.status}`);
  const all  = await res.json();
  if (!Array.isArray(all) || all.length === 0) throw new Error('Empty response');

  // Pick randomly from the last 200 puzzles (more variety, still recent & hard)
  const pool = all.slice(Math.max(0, all.length - 200));
  // try up to 5 times to get a parseable one
  for (let i = 0; i < 5; i++) {
    const raw    = pool[Math.floor(Math.random() * pool.length)];
    const puzzle = parsePuzzle(raw);
    if (puzzle && puzzle.categories.length === 4) return puzzle;
  }
  throw new Error('Could not parse puzzle');
}

// ── Phaser ────────────────────────────────────────────────────────────────────
const DPR = Math.min(window.devicePixelRatio || 1, 2);
const W   = Math.round(Math.min(500, window.innerWidth - 8) * DPR);
const H   = Math.round(620 * DPR);
let phaserGame = null;

class ClusterScene extends Phaser.Scene {
  constructor(){ super({ key:'ClusterScene' }); }
  init(data){ this.puzzleData = data.puzzle; }

  create(){
    this.allTiles   = shuffle(this.puzzleData.categories.flatMap((cat,ci)=>cat.words.map(w=>({word:w,catIndex:ci}))));
    this.selected   = new Set();
    this.solvedCats = [];
    this.mistakes   = 0;
    this.maxMistakes= 4;
    this.gameOver   = false;
    this.animLock   = false;
    this.tileObjs   = [];
    this.msgText    = null;
    this._msgTimer  = null;
    this.submitRef  = null;
    this.fullRedraw();
  }

  s(n){ return Math.round(n * DPR); }
  get PAD()     { return this.s(16); }
  get GAP()     { return this.s(8);  }
  get TILE_W()  { return Math.floor((W - this.PAD*2 - this.GAP*3) / 4); }
  get TILE_H()  { return this.s(64); }
  get SOL_H()   { return this.s(52); }
  get GRID_TOP(){ return this.solvedCats.length * (this.SOL_H + this.GAP); }

  tileKey(t)   { return t.catIndex + '|' + t.word; }
  activeTiles(){ return this.allTiles.filter(t => !this.solvedCats.includes(t.catIndex)); }

  fullRedraw(){
    this.children.removeAll(true);
    this.tileObjs = [];
    this.drawSolvedRows();
    this.drawTiles();
    this.drawBottomUI();
  }

  drawSolvedRows(){
    this.solvedCats.forEach((ci, row) => {
      const cat = this.puzzleData.categories[ci];
      const x=this.PAD, y=row*(this.SOL_H+this.GAP), rw=W-this.PAD*2;
      const g = this.add.graphics();
      g.fillStyle(0x1c1c1c,1); g.fillRoundedRect(x,y,rw,this.SOL_H,this.s(6));
      g.fillStyle(cat.accent,1); g.fillRect(x,y,this.s(3),this.SOL_H);
      g.fillStyle(cat.accent,0.07); g.fillRoundedRect(x,y,rw,this.SOL_H,this.s(6));
      this.add.text(x+this.s(16), y+this.s(10), cat.label,
        {fontFamily:'DM Mono',fontSize:`${this.s(9)}px`,color:cat.hex,letterSpacing:this.s(2)});
      this.add.text(x+this.s(16), y+this.s(27), cat.words.join('  ·  '),
        {fontFamily:'DM Mono',fontSize:`${this.s(12)}px`,fontStyle:'bold',color:'#d0cdc6'});
    });
  }

  drawTiles(){
    this.activeTiles().forEach((tile, i) => {
      const col=i%4, row=Math.floor(i/4);
      const x = this.PAD + col*(this.TILE_W+this.GAP);
      const y = this.GRID_TOP + row*(this.TILE_H+this.GAP);
      const sel = this.selected.has(this.tileKey(tile));
      const g = this.add.graphics();
      this.paintTile(g,x,y,sel,false);
      const txt = this.add.text(x+this.TILE_W/2, y+this.TILE_H/2, tile.word, {
        fontFamily:'DM Mono', fontSize:`${this.s(11)}px`, fontStyle:'bold',
        color: sel?'#0e0e0e':'#b0ada6', align:'center', wordWrap:{width:this.TILE_W-this.s(12)}
      }).setOrigin(0.5,0.5);
      const zone = this.add.zone(x,y,this.TILE_W,this.TILE_H).setOrigin(0,0).setInteractive({cursor:'pointer'});
      zone.on('pointerover',()=>{ if(!this.selected.has(this.tileKey(tile))) this.paintTile(g,x,y,false,true); });
      zone.on('pointerout', ()=>{ if(!this.selected.has(this.tileKey(tile))) this.paintTile(g,x,y,false,false); });
      zone.on('pointerup',  ()=>this.onTileClick(tile,g,txt,x,y));
      this.tileObjs.push({tile,g,txt,zone,x,y});
    });
  }

  paintTile(g,x,y,sel,hover){
    g.clear(); const r=this.s(7);
    if(sel)       { g.fillStyle(0xcfc4a2,1); g.fillRoundedRect(x,y,this.TILE_W,this.TILE_H,r); }
    else if(hover){ g.fillStyle(0x212121,1); g.fillRoundedRect(x,y,this.TILE_W,this.TILE_H,r); g.lineStyle(this.s(1),0x3c3c3c,1); g.strokeRoundedRect(x,y,this.TILE_W,this.TILE_H,r); }
    else          { g.fillStyle(0x181818,1); g.fillRoundedRect(x,y,this.TILE_W,this.TILE_H,r); g.lineStyle(this.s(1),0x272727,1); g.strokeRoundedRect(x,y,this.TILE_W,this.TILE_H,r); }
  }

  drawBottomUI(){
    const rows  = Math.ceil(this.activeTiles().length/4) || 0;
    const baseY = this.GRID_TOP + rows*(this.TILE_H+this.GAP) + this.s(14);
    this.msgText = this.add.text(W/2, baseY, '', {
      fontFamily:'DM Mono', fontSize:`${this.s(11)}px`, color:'#888', letterSpacing:this.s(2)
    }).setOrigin(0.5,0);

    const dotsY = baseY + this.s(36);
    this.add.text(this.PAD, dotsY+this.s(5), 'LIVES', {
      fontFamily:'DM Mono', fontSize:`${this.s(8)}px`, color:'#333', letterSpacing:this.s(2)
    }).setOrigin(0,0.5);
    for(let i=0;i<this.maxMistakes;i++){
      const g=this.add.graphics();
      g.fillStyle(i<this.mistakes?0x252525:0xcfc4a2,1);
      g.fillCircle(W/2-this.s(30)+i*this.s(20), dotsY, this.s(5));
    }

    const btnY = dotsY + this.s(44);
    this.makeBtn(W/2-this.s(116), btnY, this.s(96), this.s(34), 'SHUFFLE', ()=>this.doShuffle());
    this.makeBtn(W/2,             btnY, this.s(96), this.s(34), 'CLEAR',   ()=>this.doClear());
    this.submitRef = this.makeBtn(W/2+this.s(116), btnY, this.s(96), this.s(34), 'SUBMIT', ()=>this.doSubmit(), true);
    this.refreshSubmit();
  }

  makeBtn(cx,cy,w,h,label,cb,isSubmit=false){
    const x=cx-w/2, r=h/2;
    const g=this.add.graphics();
    const lbl=this.add.text(cx,cy,label,{fontFamily:'DM Mono',fontSize:`${this.s(10)}px`,fontStyle:'bold',color:'#3a3a3a',letterSpacing:this.s(2)}).setOrigin(0.5,0.5);
    const draw=(state)=>{
      g.clear();
      if(state==='active')     { g.fillStyle(0xcfc4a2,1); g.fillRoundedRect(x,cy-h/2,w,h,r); lbl.setColor('#0e0e0e'); }
      else if(state==='hover') { g.lineStyle(this.s(1),0x484848,1); g.strokeRoundedRect(x,cy-h/2,w,h,r); lbl.setColor('#888'); }
      else                     { g.lineStyle(this.s(1),0x282828,1); g.strokeRoundedRect(x,cy-h/2,w,h,r); lbl.setColor('#3a3a3a'); }
    };
    draw('normal');
    const zone=this.add.zone(x,cy-h/2,w,h).setOrigin(0,0).setInteractive({cursor:'pointer'});
    zone.on('pointerover',()=>{ if(isSubmit&&this.selected.size!==4) return; draw('hover'); });
    zone.on('pointerout', ()=>{ if(isSubmit&&this.selected.size===4){ draw('active'); return; } draw('normal'); });
    zone.on('pointerup',  ()=>{ if(!this.gameOver&&!this.animLock) cb(); });
    return {g,lbl,draw};
  }

  refreshSubmit(){ if(this.submitRef) this.submitRef.draw(this.selected.size===4?'active':'normal'); }

  onTileClick(tile,g,txt,x,y){
    if(this.gameOver||this.animLock) return;
    const key=this.tileKey(tile);
    if(this.selected.has(key)){
      this.selected.delete(key); this.paintTile(g,x,y,false,false); txt.setColor('#b0ada6');
    } else {
      if(this.selected.size>=4) return;
      this.selected.add(key); this.paintTile(g,x,y,true,false); txt.setColor('#0e0e0e');
      this.tweens.add({targets:txt,scaleX:1.08,scaleY:1.08,duration:70,yoyo:true});
    }
    this.refreshSubmit();
  }

  doShuffle(){
    const active=this.activeTiles(), sh=shuffle(active); let si=0;
    this.allTiles=this.allTiles.map(t=>this.solvedCats.includes(t.catIndex)?t:sh[si++]);
    this.selected.clear(); this.fullRedraw();
  }

  doClear(){
    this.selected.clear();
    this.tileObjs.forEach(o=>{ this.paintTile(o.g,o.x,o.y,false,false); o.txt.setColor('#b0ada6'); });
    this.refreshSubmit();
  }

  doSubmit(){
    if(this.selected.size!==4||this.animLock||this.gameOver) return;
    const selObjs=this.tileObjs.filter(o=>this.selected.has(this.tileKey(o.tile)));
    const cats=selObjs.map(o=>o.tile.catIndex);
    const allSame=cats.every(c=>c===cats[0]);

    if(allSame){
      this.animLock=true; const ci=cats[0]; let done=0;
      selObjs.forEach((o,i)=>{
        this.tweens.add({targets:[o.txt],y:o.y+this.TILE_H/2-this.s(8),duration:90,delay:i*55,yoyo:true,ease:'Sine.easeOut',
          onComplete:()=>{ done++; if(done===selObjs.length){
            this.time.delayedCall(100,()=>{
              this.solvedCats.push(ci); this.selected.clear(); this.animLock=false; this.fullRedraw();
              const msgs=['NICE!','CORRECT!','BRILLIANT!','NAILED IT!','STELLAR!'];
              this.showMsg(msgs[Math.floor(Math.random()*msgs.length)],'#6dbf8a',1600);
              if(this.solvedCats.length===4) this.time.delayedCall(900,()=>this.endGame(true));
            });
          }}
        });
      });
    } else {
      this.mistakes++;
      const freq={}; cats.forEach(c=>freq[c]=(freq[c]||0)+1);
      const oneAway=Object.values(freq).some(v=>v===3);
      this.showMsg(oneAway?'ONE AWAY...':'NOT QUITE','#e8c547',1800);
      selObjs.forEach(o=>{
        const ox=o.x; let tick=0;
        this.time.addEvent({delay:38,repeat:9,callback:()=>{
          tick++; const off=tick%2===0?this.s(7):-this.s(7);
          o.g.x=off; o.txt.x=ox+this.TILE_W/2+off;
        }});
        this.time.delayedCall(400,()=>{ o.g.x=0; o.txt.x=ox+this.TILE_W/2; });
      });
      this.time.delayedCall(520,()=>{
        this.selected.clear(); this.fullRedraw();
        if(this.mistakes>=this.maxMistakes) this.time.delayedCall(300,()=>this.endGame(false));
      });
    }
  }

  showMsg(text,color,duration){
    if(!this.msgText||!this.msgText.active) return;
    this.msgText.setText(text).setColor(color||'#888');
    if(this._msgTimer) this._msgTimer.remove();
    if(duration) this._msgTimer=this.time.delayedCall(duration,()=>{ if(this.msgText&&this.msgText.active) this.msgText.setText(''); });
  }

  endGame(win){
    this.gameOver=true;
    if(!win){
      this.puzzleData.categories.forEach((_,ci)=>{ if(!this.solvedCats.includes(ci)) this.solvedCats.push(ci); });
      this.allTiles=[]; this.selected.clear(); this.fullRedraw();
      this.showMsg('BETTER LUCK NEXT TIME','#555',0);
    } else {
      this.showMsg('YOU GOT THEM ALL!','#6dbf8a',0);
    }
    const cy=this.solvedCats.length*(this.SOL_H+this.GAP)+this.s(42);
    const bw=this.s(150),bh=this.s(38);
    const g=this.add.graphics();
    g.fillStyle(0xcfc4a2,1); g.fillRoundedRect(W/2-bw/2,cy-bh/2,bw,bh,bh/2);
    this.add.text(W/2,cy,'NEW PUZZLE',{fontFamily:'DM Mono',fontSize:`${this.s(11)}px`,fontStyle:'bold',color:'#0e0e0e',letterSpacing:this.s(2)}).setOrigin(0.5,0.5);
    const zone=this.add.zone(W/2-bw/2,cy-bh/2,bw,bh).setOrigin(0,0).setInteractive({cursor:'pointer'});
    zone.on('pointerup',()=>startGame());
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
function show(id){
  ['loading','err','game-wrapper'].forEach(s=>{
    document.getElementById(s).style.display = s===id?(s==='game-wrapper'?'flex':'block'):'none';
  });
}

async function startGame(){
  show('loading');
  try {
    const puzzle = await fetchRandomPuzzle();
    document.getElementById('puzzle-meta').textContent = `NYT PUZZLE #${puzzle.id}  ·  ${puzzle.date}`;
    show('game-wrapper');
    if(phaserGame){
      phaserGame.scene.getScene('ClusterScene').scene.restart({puzzle});
    } else {
      phaserGame = new Phaser.Game({
        type:Phaser.AUTO, width:W, height:H, backgroundColor:'#0e0e0e',
        parent:document.getElementById('game-wrapper'),
        scene:[ClusterScene], resolution:DPR,
        scale:{mode:Phaser.Scale.NONE,autoCenter:Phaser.Scale.CENTER_HORIZONTALLY,zoom:1/DPR}
      });
      setTimeout(()=>phaserGame.scene.start('ClusterScene',{puzzle}),150);
    }
  } catch(e){
    console.error(e);
    const el=document.getElementById('err');
    el.innerHTML=`Could not load puzzle — check your internet connection.<br><span style="color:#444;font-size:9px;">${e.message}</span>`;
    show('err');
  }
}

startGame();
</script>
</body>
</html>
