 *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
 html,body{
   width:100%;min-height:100vh;
   background:#090909;
   display:flex;flex-direction:column;align-items:center;
   overflow-x:hidden;
   position:relative;
 }
 /* subtle noise overlay */
 body::before{
   content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
   opacity:0.028;
   background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
   background-size:180px;
 }
 /* glow */
 body::after{
   content:'';position:fixed;top:-40%;left:50%;transform:translateX(-50%);
   width:600px;height:600px;
   background:radial-gradient(circle,rgba(207,196,162,0.03) 0%,transparent 70%);
   pointer-events:none;z-index:0;
 }
  #chrome{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;}
 #top-bar{
   width:100%;max-width:520px;padding:36px 20px 0;
   display:flex;flex-direction:column;align-items:center;gap:0;
 }
 #top-bar .issue{
   font-family:'DM Mono',monospace;font-size:9px;color:#2a2a2a;
   letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;
 }
 #top-bar h1{
   font-family:'Instrument Serif',serif;font-size:52px;font-weight:400;
   color:#e8e4dc;letter-spacing:1px;line-height:1;
 }
 #top-bar .subtitle{
   font-family:'DM Mono',monospace;font-size:9px;color:#3a3a3a;
   letter-spacing:3px;text-transform:uppercase;margin-top:8px;
 }

 #rule{
   width:100%;max-width:520px;height:1px;margin:20px 0 16px;
   background:linear-gradient(to right,transparent,#1e1e1e 20%,#1e1e1e 80%,transparent);
 }
 #toolbar{
   width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;
   padding:0 20px 14px;
 }
 #toolbar .left,#toolbar .right{display:flex;gap:8px;align-items:center;}
 .tool-btn{
   font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;
   color:#333;background:none;border:1px solid #1a1a1a;border-radius:100px;
   padding:6px 14px;cursor:pointer;transition:all 0.3s ease;
 }
 .tool-btn:hover{color:#888;border-color:#333;}
 .tool-btn.accent{color:#090909;background:#cfc4a2;border-color:#cfc4a2;font-weight:500;}
 .tool-btn.accent:hover{background:#e0d7b8;border-color:#e0d7b8;}
 .tool-btn.check{padding:8px 24px;font-size:10px;letter-spacing:3px;position:relative;}
 .tool-btn.check .count{
   display:inline-block;margin-left:6px;
   min-width:14px;height:14px;line-height:14px;text-align:center;
   border-radius:7px;font-size:8px;letter-spacing:0;
   background:#2a2a2a;color:#555;
   transition:all 0.3s ease;
 }
 .tool-btn.check.accent .count{background:rgba(0,0,0,0.15);color:#090909;}
 .tool-btn.danger{color:#6b3a3a;border-color:#2a1a1a;}
 .tool-btn.danger:hover{color:#c25050;border-color:#3a2020;}
 #lives-row{display:flex;align-items:center;gap:6px;}
 #lives-row .label{font-family:'DM Mono',monospace;font-size:8px;color:#2a2a2a;letter-spacing:2px;text-transform:uppercase;margin-right:4px;}
 .life-pip{width:6px;height:6px;border-radius:50%;background:#cfc4a2;transition:all 0.5s ease;}
 .life-pip.spent{background:#1a1a1a;transform:scale(0.7);}
 #game-wrapper{
   width:100%;max-width:520px;display:flex;justify-content:center;
   position:relative;z-index:1;
 }
 #game-wrapper canvas{width:100%!important;height:auto!important;}
 #msg-bar{
   width:100%;max-width:520px;height:24px;
   display:flex;justify-content:center;align-items:center;
   font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;
   color:#444;text-transform:uppercase;
   transition:all 0.4s ease;margin-top:2px;
 }
 #footer{
   width:100%;max-width:520px;padding:12px 20px 24px;
   display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
   align-items:center;
 }

// Colour palette 
const LEVEL_COLORS = [
 { accent:0xd4c47a, hex:'#d4c47a', glow:'rgba(212,196,122,' },
 { accent:0x7abf8e, hex:'#7abf8e', glow:'rgba(122,191,142,' },
 { accent:0x7aacd4, hex:'#7aacd4', glow:'rgba(122,172,212,' },

];


function shuffle(arr){
 const a=[...arr];
 for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
 return a;
}
function getRandomPuzzle(){
 const raw=PUZZLES[Math.floor(Math.random()*PUZZLES.length)];
 return {
   date:raw.date, id:raw.id,
   categories:raw.categories.map(c=>({
     ...LEVEL_COLORS[c.level], level:c.level, label:c.label,
     words:c.words.map(w=>w.toUpperCase())
   }))
 };
}
// DOM helpers
const $msg    = ()=>document.getElementById('msg-bar');
const $submit = ()=>document.getElementById('btn-submit');
let msgTimer  = null;


function showMsg(text, color, duration){
 const el=$msg(); if(!el) return;
 el.textContent=text; el.style.color=color||'#444';
 clearTimeout(msgTimer);
 if(duration) msgTimer=setTimeout(()=>{ el.textContent=''; },duration);
}
function updateLives(mistakes, max){
 for(let i=0;i<max;i++){
   const p=document.getElementById('pip'+i);
   if(p) p.className = i < mistakes ? 'life-pip spent' : 'life-pip';
 }
}
function updateSubmitBtn(active, selCount){
 const b=$submit(); if(!b) return;
 if(active){ b.classList.add('accent'); } else { b.classList.remove('accent'); }
 const counter=document.getElementById('sel-count');
 if(counter) counter.textContent=(selCount||0)+'/4';
}
function setToolbarEnabled(enabled){
 const ids=['btn-clue','btn-quit','btn-submit'];
 ids.forEach(id=>{
   const el=document.getElementById(id);
   if(el){ el.style.opacity=enabled?'1':'0.3'; el.style.pointerEvents=enabled?'auto':'none'; }
 });
 document.querySelectorAll('#footer .tool-btn').forEach(el=>{
   el.style.opacity=enabled?'1':'0.3'; el.style.pointerEvents=enabled?'auto':'none';
 });
}
// ── Game action (DOM to Phaser)
function gameAction(action){
 if(!phaserGame) return;
 if(action==='quit'){ startGame(); return; }
 const scene=phaserGame.scene.getScene('ClusterScene');
 if(!scene) return;
 switch(action){
   case 'shuffle': scene.doShuffle(); break;
   case 'clear':   scene.doClear();   break;
   case 'submit':  scene.doSubmit();  break;
   case 'clue':    scene.doClue();    break;
 }
}
//  Phaser game config
const DPR = Math.min(window.devicePixelRatio||1, 2);
const W   = Math.round(Math.min(490, window.innerWidth-16)*DPR);
const H   = Math.round(310*DPR);
let phaserGame = null;
class ClusterScene extends Phaser.Scene {
 constructor(){ super({key:'ClusterScene'}); }
 init(data){ this.puzzleData=data.puzzle; }
 create(){
   this.allTiles   = shuffle(this.puzzleData.categories.flatMap((cat,ci)=>cat.words.map(w=>({word:w,catIndex:ci}))));
   this.selected   = new Set();
   this.solvedCats = [];
   this.mistakes   = 0;
   this.maxMistakes= 4;
   this.gameOver   = false;
   this.animLock   = false;
   this.tileObjs   = [];


   updateLives(0, this.maxMistakes);
   showMsg('', '#444', 0);
   setToolbarEnabled(true);
   updateSubmitBtn(false, 0);
   this.fullRedraw(true);
 }
 s(n){ return Math.round(n*DPR); }
 get PAD()     { return this.s(18); }
 get GAP()     { return this.s(7);  }
 get TILE_W()  { return Math.floor((W-this.PAD*2-this.GAP*3)/4); }
 get TILE_H()  { return this.s(60); }
 get SOL_H()   { return this.s(54); }
 get GRID_TOP(){ return this.solvedCats.length*(this.SOL_H+this.GAP); }


 tileKey(t){ return t.catIndex+'|'+t.word; }
 activeTiles(){ return this.allTiles.filter(t=>!this.solvedCats.includes(t.catIndex)); }


 fullRedraw(animate){
   this.children.removeAll(true);
   this.tileObjs=[];
   this.drawSolvedRows(animate);
   this.drawTiles(animate);
 }


 drawSolvedRows(animate){
   this.solvedCats.forEach((ci,row)=>{
     const cat=this.puzzleData.categories[ci];
     const x=this.PAD, y=row*(this.SOL_H+this.GAP), rw=W-this.PAD*2;
     const g=this.add.graphics();
     g.fillStyle(0x111111,1);
     g.fillRoundedRect(x,y,rw,this.SOL_H,this.s(8));
     g.fillStyle(cat.accent,1);
g.fillRoundedRect(x,y,this.s(3),this.SOL_H,{tl:this.s(8),bl:this.s(8),tr:0,br:0});
     g.fillStyle(cat.accent,0.04);
     g.fillRoundedRect(x,y,rw,this.SOL_H,this.s(8));
     g.lineStyle(1,cat.accent,0.12);
     g.strokeRoundedRect(x,y,rw,this.SOL_H,this.s(8));
     const lbl=this.add.text(x+this.s(18),y+this.s(12),cat.label,{
       fontFamily:'DM Mono',fontSize:this.s(9)+'px',color:cat.hex,letterSpacing:this.s(2)
     });
     const wds=this.add.text(x+this.s(18),y+this.s(30),cat.words.join('  \u00b7  '),{
       fontFamily:'Space Grotesk',fontSize:this.s(11)+'px',fontStyle:'500',color:'#706d66'
     });
     // animate newest solved row sliding in
     const isNewest = animate && row===this.solvedCats.length-1;
     if(isNewest){
       g.setAlpha(0); g.x=-this.s(40);
       lbl.setAlpha(0); lbl.x-=this.s(40);
       wds.setAlpha(0); wds.x-=this.s(40);
       this.tweens.add({targets:g,x:0,alpha:1,duration:420,ease:'Back.easeOut',delay:50});
       this.tweens.add({targets:lbl,x:lbl.x+this.s(40),alpha:1,duration:420,ease:'Back.easeOut',delay:100});
       this.tweens.add({targets:wds,x:wds.x+this.s(40),alpha:1,duration:420,ease:'Back.easeOut',delay:150});
     }
   });
 }
 drawTiles(animate){
   const active=this.activeTiles();
   active.forEach((tile,i)=>{
     const col=i%4, row=Math.floor(i/4);
     const x=this.PAD+col*(this.TILE_W+this.GAP);
     const y=this.GRID_TOP+row*(this.TILE_H+this.GAP);
     const sel=this.selected.has(this.tileKey(tile));
     const g=this.add.graphics();
     const key=this.tileKey(tile);
     this.paintTile(g,x,y,sel,false);
     const txt=this.add.text(x+this.TILE_W/2,y+this.TILE_H/2,tile.word,{
       fontFamily:'Space Grotesk',fontSize:this.s(11)+'px',fontStyle:'600',
       color:sel?'#0a0a0a':'#8a877f',align:'center',
       wordWrap:{width:this.TILE_W-this.s(14)}
     }).setOrigin(0.5,0.5);
     const o={g,txt,x,y,tile};
     this.tileObjs.push(o);
     g.setPosition(x,y);
     g.setInteractive(new Phaser.Geom.Rectangle(0,0,this.TILE_W,this.TILE_H),Phaser.Geom.Rectangle.Contains);
     g.on('pointerup',()=>{
       const isSelected=this.selected.has(key);
       if(isSelected){
         this.selected.delete(key);
         this.paintTile(g,x,y,false,false);
         txt.setColor('#8a877f');
         this.tweens.add({targets:[g,txt],scaleX:0.92,scaleY:0.92,duration:80,yoyo:true,ease:'Sine.easeOut'});
       } else {
         if(this.selected.size>=4) return;
         this.selected.add(key);
         this.paintTile(g,x,y,true,false);
         txt.setColor('#0a0a0a');
         this.tweens.add({targets:[g,txt],scaleX:1.08,scaleY:1.08,duration:100,yoyo:true,ease:'Back.easeOut'});
       }
       updateSubmitBtn(this.selected.size===4, this.selected.size);
     });
   });
 }
 paintTile(g,x,y,selected,hover){
   g.clear();
   const r=this.s(8);
   g.fillStyle(selected?0x2a2a2a:0x111111,1);
   g.fillRoundedRect(x,y,this.TILE_W,this.TILE_H,r);
   g.lineStyle(1,selected?0x4a4a4a:0x1a1a1a,0.5);
   g.strokeRoundedRect(x,y,this.TILE_W,this.TILE_H,r);
 }
 doShuffle(){
   if(this.gameOver||this.animLock) return;
   this.animLock=true;
   // scatter tiles out
   this.tileObjs.forEach((o,i)=>{
     const dx=(Math.random()-0.5)*this.s(60);
     const dy=(Math.random()-0.5)*this.s(30);
     this.tweens.add({targets:[o.g,o.txt],alpha:0,x:'+='+dx,y:'+='+dy,duration:200,ease:'Sine.easeIn',delay:i*15});
   });
   this.time.delayedCall(280,()=>{
     const active=this.activeTiles(), sh=shuffle(active); let si=0;
     this.allTiles=this.allTiles.map(t=>this.solvedCats.includes(t.catIndex)?t:sh[si++]);
     this.selected.clear();
     updateSubmitBtn(false, 0);
     this.fullRedraw(true);
     this.animLock=false;
   });
 }
 doClear(){
   if(this.gameOver||this.animLock) return;
   this.selected.clear();
   this.tileObjs.forEach(o=>{
     this.paintTile(o.g,o.x,o.y,false,false);
     o.txt.setColor('#8a877f');
   });
   updateSubmitBtn(false, 0);
 }


 doClue(){
   if(this.gameOver||this.animLock) return;
   if(this.mistakes>=this.maxMistakes-1){
     showMsg('NOT ENOUGH LIVES','#c25050',1800);
     return;
   }
   const unsolved=this.puzzleData.categories.map((_,i)=>i).filter(i=>!this.solvedCats.includes(i));
   if(unsolved.length===0) return;
   const ci=unsolved[Math.floor(Math.random()*unsolved.length)];
   const cat=this.puzzleData.categories[ci];
   this.mistakes++;
   updateLives(this.mistakes,this.maxMistakes);
   showMsg('CLUE \u2014 '+cat.label, cat.hex, 3000);
   const catTiles=this.tileObjs.filter(o=>o.tile.catIndex===ci);
   catTiles.forEach((o,idx)=>{
     const origColor=this.selected.has(this.tileKey(o.tile))?'#0a0a0a':'#8a877f';
     // staggered wave pulse
     this.time.delayedCall(idx*80,()=>{
       o.txt.setColor(cat.hex);
       // repaint tile with accent border
       o.g.clear();
       const r=this.s(8);
       o.g.fillStyle(0x111111,1);
       o.g.fillRoundedRect(o.x,o.y,this.TILE_W,this.TILE_H,r);
       o.g.lineStyle(1,cat.accent,0.5);
       o.g.strokeRoundedRect(o.x,o.y,this.TILE_W,this.TILE_H,r);
       this.tweens.add({targets:[o.g,o.txt],scaleX:1.08,scaleY:1.08,duration:200,yoyo:true,ease:'Sine.easeInOut'});
     });
     this.time.delayedCall(1400+idx*80,()=>{
       if(o.txt&&o.txt.active) o.txt.setColor(origColor);
       if(o.g&&o.g.active){
         const sel=this.selected.has(this.tileKey(o.tile));
         this.paintTile(o.g,o.x,o.y,sel,false);
       }
     });
   });
   if(this.mistakes>=this.maxMistakes){
     this.time.delayedCall(1600,()=>this.endGame(false));
   }
 }
 doSubmit(){
   if(this.selected.size!==4||this.animLock||this.gameOver) return;
   const selObjs=this.tileObjs.filter(o=>this.selected.has(this.tileKey(o.tile)));
   const cats=selObjs.map(o=>o.tile.catIndex);
   const allSame=cats.every(c=>c===cats[0]);


   if(allSame){
     this.animLock=true;
     const ci=cats[0];
     const cat=this.puzzleData.categories[ci];
     const targetY=this.solvedCats.length*(this.SOL_H+this.GAP)+this.SOL_H/2;

    // Phase 1: flash tiles with category color
     selObjs.forEach(o=>{
       o.g.clear();
       const r=this.s(8);
       o.g.fillStyle(cat.accent,1);
       o.g.fillRoundedRect(o.x,o.y,this.TILE_W,this.TILE_H,r);
       o.txt.setColor('#0a0a0a');
     });


     // Phase 2: after flash, fly tiles to the solved row position
     this.time.delayedCall(350,()=>{
       const centerX=W/2;
       let done=0;
       selObjs.forEach((o,i)=>{
         // fly to center-top
         this.tweens.add({
           targets:o.g,
           x:centerX-this.TILE_W/2,
           y:targetY-this.TILE_H/2,
           scaleX:0.3, scaleY:0.3, alpha:0,
           duration:380, delay:i*50, ease:'Cubic.easeIn'
         });
         this.tweens.add({
           targets:o.txt,
           x:centerX, y:targetY,
           scaleX:0, scaleY:0, alpha:0,
           duration:380, delay:i*50, ease:'Cubic.easeIn',
           onComplete:()=>{
             done++;
             if(done===selObjs.length){
               // spawn small particles at merge point
               this.spawnParticles(centerX,targetY,cat.accent,12);
               this.time.delayedCall(100,()=>{
                 this.solvedCats.push(ci);
                 this.selected.clear();
                 this.animLock=false;
                 updateSubmitBtn(false, 0);
                 this.fullRedraw(true);
                 const msgs=['Nice.','Correct.','Brilliant.','Nailed it.','Stellar.','Sharp.'];
                 showMsg(msgs[Math.floor(Math.random()*msgs.length)],'#7abf8e',1600);
                 if(this.solvedCats.length===4){
                   this.time.delayedCall(600,()=>this.endGame(true));
                 }
               });
             }
           }
         });
       });
     });
   } else {
     this.mistakes++;
     updateLives(this.mistakes,this.maxMistakes);
     const freq={};
     cats.forEach(c=>freq[c]=(freq[c]||0)+1);
     const oneAway=Object.values(freq).some(v=>v===3);
     showMsg(oneAway?'One away\u2026':'Not quite.','#d4c47a',1800);


     // elastic shake + red flash
     this.animLock=true;
     selObjs.forEach(o=>{
       // flash red
       o.g.clear();
       const r=this.s(8);
       o.g.fillStyle(0x3a1515,1);
       o.g.fillRoundedRect(o.x,o.y,this.TILE_W,this.TILE_H,r);
       o.g.lineStyle(1,0x6b2a2a,1);
       o.g.strokeRoundedRect(o.x,o.y,this.TILE_W,this.TILE_H,r);
       o.txt.setColor('#c25050');
     });
        // elastic horizontal shake
     const amp=[this.s(8),-this.s(14),this.s(10),-this.s(6),this.s(3),0];
     let shakeDelay=0;
     amp.forEach((dx)=>{
       selObjs.forEach(o=>{
         this.tweens.add({targets:o.g,x:dx,duration:45,ease:'Sine.easeInOut',delay:shakeDelay});
         this.tweens.add({targets:o.txt,x:o.x+this.TILE_W/2+dx,duration:45,ease:'Sine.easeInOut',delay:shakeDelay});
       });
       shakeDelay+=45;
     });


     this.time.delayedCall(600,()=>{
       this.selected.clear();
       updateSubmitBtn(false, 0);
       this.animLock=false;
       this.fullRedraw(true);
       if(this.mistakes>=this.maxMistakes){
         this.time.delayedCall(300,()=>this.endGame(false));
       }
     });
   }
 }

 /* Particle burst helper */
 spawnParticles(cx,cy,color,count){
   for(let i=0;i<count;i++){
     const angle=Math.random()*Math.PI*2;
     const dist=this.s(30)+Math.random()*this.s(50);
     const size=this.s(2)+Math.random()*this.s(3);
     const g=this.add.graphics();
     g.fillStyle(color,0.8);
     g.fillCircle(0,0,size);
     g.setPosition(cx,cy);
     this.tweens.add({
       targets:g,
       x:cx+Math.cos(angle)*dist,
       y:cy+Math.sin(angle)*dist,
       alpha:0,
       scaleX:0,scaleY:0,
       duration:500+Math.random()*300,
       ease:'Cubic.easeOut',
       onComplete:()=>g.destroy()
     });
   }
 }


 endGame(win){
   this.gameOver=true;
   setToolbarEnabled(false);
   if(!win){
     this.puzzleData.categories.forEach((_,ci)=>{
       if(!this.solvedCats.includes(ci)) this.solvedCats.push(ci);
     });
     this.allTiles=[];
     this.selected.clear();
     this.fullRedraw(true);
     showMsg('Better luck next time.','#555',0);
   } else {
     showMsg('All four found.','#7abf8e',0);
     // celebratory burst from multiple points
     const colors=[0xd4c47a,0x7abf8e,0x7aacd4,0xb48fd6];
     for(let b=0;b<4;b++){
       this.time.delayedCall(b*180,()=>{
         const bx=this.s(60)+Math.random()*(W-this.s(120));
         const by=this.s(40)+Math.random()*this.s(140);
         this.spawnParticles(bx,by,colors[b],16);
       });
     }
   }
   // "New Puzzle" button with fade-in
   const cy=this.solvedCats.length*(this.SOL_H+this.GAP)+this.s(36);
   const bw=this.s(140),bh=this.s(36);
   const g=this.add.graphics();
   g.fillStyle(0xcfc4a2,1);
   g.fillRoundedRect(W/2-bw/2,cy-bh/2,bw,bh,bh/2);
   g.setAlpha(0);
   const btnTxt=this.add.text(W/2,cy,'New Puzzle',{
     fontFamily:'Space Grotesk',fontSize:this.s(11)+'px',fontStyle:'600',color:'#0a0a0a',letterSpacing:this.s(1)
   }).setOrigin(0.5,0.5).setAlpha(0);
   this.tweens.add({targets:[g,btnTxt],alpha:1,duration:500,ease:'Sine.easeOut',delay:win?800:400});
   const zone=this.add.zone(W/2-bw/2,cy-bh/2,bw,bh).setOrigin(0,0).setInteractive({cursor:'pointer'});
   zone.on('pointerup',()=>startGame());
 }
}
// ── Bootstrap ─────────────────────────────────────────────────────────────────
function startGame(){
 const puzzle=getRandomPuzzle();
 document.getElementById('puzzle-meta').textContent='No. '+puzzle.id+'  \u00b7  '+puzzle.date;
 if(phaserGame){
   phaserGame.scene.getScene('ClusterScene').scene.restart({puzzle});
 } else {
   phaserGame=new Phaser.Game({
     type:Phaser.AUTO, width:W, height:H, backgroundColor:'#090909',
     parent:document.getElementById('game-wrapper'),
     resolution:DPR,
     scale:{mode:Phaser.Scale.NONE,autoCenter:Phaser.Scale.CENTER_HORIZONTALLY,zoom:1/DPR},
     callbacks:{
       postBoot:function(game){
         game.scene.add('ClusterScene',ClusterScene,true,{puzzle});
       }
     }
   });
 }
}


startGame();
</script>
